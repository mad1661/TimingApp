runConfig:
  minInstances: 0
  # Pin to a single instance so the in-memory event cache stays coherent: with
  # multiple instances a read can land on a worker that hasn't yet seen another
  # worker's just-scraped runs, so the page shows stale data until that worker's
  # 30s cache TTL lapses. One instance (concurrency 80) is plenty at this scale.
  maxInstances: 1
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  - variable: NHRA_USERNAME
    secret: NHRA_USERNAME
  - variable: NHRA_PASSWORD
    secret: NHRA_PASSWORD
  # NHRA_API_KEY intentionally omitted: App Hosting fails the build if it
  # references a secret that doesn't exist in Secret Manager, which was blocking
  # deploys. getresults is the default data source and doesn't need this key
  # (nhra-api.ts reads it lazily and only the optional "API" source uses it).
  # Re-add this once the NHRA_API_KEY secret exists, to re-enable the API source.
  - variable: FB_ADMIN_PROJECT_ID
    value: nhra-timing-app
